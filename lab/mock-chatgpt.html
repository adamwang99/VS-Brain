<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mock ChatGPT</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1020;color:#e8ecf3;margin:0}
    header{padding:12px 16px;border-bottom:1px solid #27304a;position:sticky;top:0;background:#0b1020}
    #feed{padding:16px;display:flex;flex-direction:column;gap:12px;min-height:60vh}
    .msg{border:1px solid #27304a;border-radius:12px;padding:10px 12px;white-space:pre-wrap}
    .msg.user{background:#12203a}.msg.assistant{background:#14261a}
    .meta{font-size:12px;opacity:.7;margin-bottom:6px}.composer{display:flex;gap:8px;padding:16px;border-top:1px solid #27304a;position:sticky;bottom:0;background:#0b1020}
    textarea{flex:1;min-height:90px;background:#0f172a;color:#e8ecf3;border:1px solid #334155;border-radius:10px;padding:10px}
    button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:12px 16px;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <strong id="providerName">Mock ChatGPT</strong>
    <div>scenario: <span id="scenarioName">loading</span></div>
  </header>
  <main id="feed"></main>
  <div class="composer">
    <textarea id="composer" placeholder="Prompt sẽ được extension paste vào đây"></textarea>
    <button id="sendBtn" aria-label="send">Send</button>
  </div>
  <script src="./mock-provider.js"></script>
</body>
</html>
