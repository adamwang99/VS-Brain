<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CrossCritic</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <header class="hero glass">
      <div>
        <h1>🧠 CrossCritic <span class="version">v0.4.1</span></h1>
        <p class="subtitle">AI debate relay · archive · checkpoint</p>
      </div>
      <div class="head-actions"><select id="langMode" title="Ngôn ngữ prompt"><option value="vi">VI</option><option value="en">EN</option></select><div id="status">Sẵn sàng</div></div>
    </header>

    <section class="glass relay" aria-label="Điều phối phản biện">
      <div class="section-head">
        <h2>Phản biện</h2>
        <button id="refreshTabsBtn" class="chip">Quét tab</button>
      </div>

      <div class="grid2">
        <label>Nguồn
          <select id="sourceTab"></select>
        </label>
        <label>Đích
          <select id="targetTab"></select>
        </label>
      </div>

      <div class="toolbar">
        <button id="autoPickBtn" disabled>Tự chọn</button>
        <button id="swapTabsBtn" disabled>↔ Đổi</button>
        <select id="relayMode" title="Chế độ lấy nội dung">
          <option value="latest">Latest</option>
          <option value="selection">Selection</option>
        </select>
      </div>

      <textarea id="extraInstruction" rows="3" placeholder="Yêu cầu bổ sung: tập trung UX, bảo mật, feasibility..."></textarea>

      <button id="relayBtn" class="primary" disabled>Dán phản biện →</button>

      <div class="loop-row">
        <label>Steps <input id="loopMaxSteps" type="number" min="1" max="20" value="6" /></label>
        <label>Delay <input id="loopDelaySec" type="number" min="3" max="120" value="12" /></label>
        <label class="toggle"><input id="autoSendToggle" type="checkbox" /> Auto-send</label>
      </div>

      <div class="toolbar">
        <button id="startLoopBtn" disabled>Auto A↔B</button>
        <button id="stopLoopBtn" disabled>Dừng</button>
        <button id="finalizeBtn">Chốt & lưu</button>
        <button id="resetRelayBtn">Reset relay</button>
      </div>

      <details class="advanced">
        <summary>Tuỳ chọn nâng cao</summary>
        <label>Cụm chốt dừng
          <input id="stopPhrase" type="text" value="CHỐT_ĐỒNG_THUẬN_HOÀN_TOÀN" />
        </label>
        <div class="fixed-template">Prompt mặc định: phản biện sâu đa góc nhìn — logic, kỹ thuật, fact, UX, bảo mật, context, vận hành.</div>
      </details>
    </section>

    <section class="glass archive" aria-label="Lưu trữ chat">
      <div class="section-head">
        <h2>Lưu trữ</h2>
        <button id="scanBtn" class="chip">Quét chat</button>
      </div>
      <div class="mini-meta">
        <span id="provider">-</span>
        <span id="count">0 tin</span>
      </div>
      <strong id="title" class="titleline">-</strong>
      <div class="toolbar wrap">
        <button id="exportJsonlBtn" disabled>JSONL mới</button>
        <button id="exportMdBtn" disabled>MD mới</button>
        <button id="exportAllJsonlBtn" disabled>JSONL full</button>
        <button id="exportAllMdBtn" disabled>MD full</button>
        <button id="checkpointBtn" disabled>Đánh mốc</button>
        <button id="clearCheckpointBtn" disabled>Xoá mốc</button>
      </div>
    </section>

    <details class="glass logbox">
      <summary>Log / debug</summary>
      <button id="exportLogBtn" class="chip">Xuất log</button>
      <pre id="log" aria-label="Nhật ký thao tác"></pre>
    </details>
  </main>
  <script src="popup.js"></script>
</body>
</html>
